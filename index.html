<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads Master | AI-инструмент для авторов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #101010;
            color: #f3f4f6;
            overflow-x: hidden;
        }
        .threads-card {
            background-color: #181818;
            border: 1px solid #333;
        }
        .copy-btn:active {
            transform: scale(0.95);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #101010; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .tab-active {
            border-bottom: 2px solid #fff;
            color: #fff;
        }
        .tab-inactive {
            border-bottom: 2px solid transparent;
            color: #6b7280;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header -->
    <header class="w-full max-w-3xl flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <svg viewBox="0 0 192 192" class="w-10 h-10 text-white fill-current" xmlns="http://www.w3.org/2000/svg">
                <path d="M141.537 88.9883C140.71 88.5919 139.87 88.2104 139.019 87.8451C137.537 60.5382 122.616 44.905 97.5619 44.745C97.4484 44.7443 97.3355 44.7443 97.222 44.7443C82.2364 44.7443 69.7731 51.1409 62.102 62.7807L75.881 72.2328C81.6116 63.5383 90.6052 61.6848 97.2286 61.6848C97.3051 61.6848 97.3819 61.6848 97.4576 61.6855C105.707 61.7381 111.932 64.1366 115.961 68.814C118.893 72.2193 120.854 76.925 121.825 82.8638C114.511 81.6207 106.601 81.2385 98.145 81.7233C74.3247 83.0954 59.0111 96.9879 60.0396 116.292C60.5615 126.084 65.4397 134.508 73.775 140.011C80.8224 144.663 89.899 146.938 99.3323 146.423C111.79 145.74 121.563 140.987 128.381 132.296C133.559 125.696 136.834 117.143 138.28 106.366C144.217 109.949 148.617 114.664 151.047 120.332C155.179 129.967 155.42 145.8 142.501 158.708C131.182 170.016 117.576 174.908 97.0135 175.059C74.2042 174.89 56.9538 167.575 45.7381 153.317C35.2355 139.966 29.8077 120.682 29.6052 96C29.8077 71.3178 35.2355 52.0336 45.7381 38.6827C56.9538 24.4249 74.2039 17.11 97.0132 16.9405C119.988 17.1113 137.539 24.4614 148.902 38.8419C156.939 48.9929 161.458 63.3039 162.25 80.9632L179.143 81.0827C178.258 59.9734 172.507 42.1478 162.128 29.0125C148.243 11.4566 126.319 2.11584 97.0132 2C67.7554 2.11584 45.8647 11.4137 32.0004 28.9046C20.0673 43.9515 13.8407 66.5244 13.6052 96C13.8407 125.476 20.0673 148.049 32.0004 163.095C45.8647 180.586 67.7554 189.884 97.0135 190C123.635 189.828 141.282 183.13 154.515 169.91C170.824 153.618 172.43 131.424 166.602 117.852C161.983 107.098 153.956 97.2657 141.537 88.9883ZM98.4405 129.507C88.0005 130.095 77.1544 125.409 76.6196 115.372C76.2232 107.93 81.9158 99.626 99.0812 98.6368C101.077 98.5218 103.111 98.4428 105.183 98.4014C104.99 113.178 103.951 125.32 98.4405 129.507Z"/>
            </svg>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Threads Master</h1>
                <p class="text-xs text-gray-500">Генератор Хуков & Умных Комментариев</p>
            </div>
        </div>
        <div class="hidden sm:block">
            <a href="https://github.com/pavelgalkin1985-dot/threads-master" target="_blank" class="text-gray-400 hover:text-white transition-colors">
                <i class="fa-brands fa-github text-2xl"></i>
            </a>
        </div>
    </header>

    <!-- API Key Settings -->
    <div class="w-full max-w-3xl mb-6">
        <div class="threads-card p-4 rounded-xl flex flex-col sm:flex-row gap-3 items-center border border-gray-800">
            <div class="flex-1 w-full relative">
                <i class="fa-solid fa-key absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                <input type="password" id="apiKeyInput" placeholder="Вставьте ваш Gemini API ключ сюда..." class="w-full bg-black text-white border border-gray-700 rounded-lg py-2.5 pl-10 pr-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>
            <button id="saveApiKeyBtn" class="w-full sm:w-auto bg-gray-800 hover:bg-gray-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm whitespace-nowrap">
                Сохранить ключ
            </button>
        </div>
        <p class="text-xs text-gray-500 mt-2 px-1"><i class="fa-solid fa-shield-halved mr-1"></i> Ключ сохраняется только в вашем браузере (localStorage) и никуда не передается. Код больше не содержит ключ напрямую.</p>
    </div>

    <!-- Main Content -->
    <main class="w-full max-w-3xl flex flex-col gap-6">
        
        <!-- Tabs -->
        <div class="flex border-b border-gray-800 mb-2">
            <button id="tabHooks" class="flex-1 py-3 text-sm font-medium tab-active transition-colors">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Генератор Хуков
            </button>
            <button id="tabComments" class="flex-1 py-3 text-sm font-medium tab-inactive hover:text-white transition-colors">
                <i class="fa-regular fa-comment-dots mr-2"></i>Умный Комментатор
            </button>
        </div>

        <!-- APP PANELS -->
        <div class="threads-card p-6 rounded-2xl shadow-lg relative overflow-hidden">
            
            <!-- PANEL 1: HOOKS -->
            <div id="panelHooks" class="fade-in">
                <h2 class="text-lg font-semibold mb-4">О чем будет ваш пост?</h2>
                <div class="flex flex-col gap-4">
                    <div>
                        <textarea id="topicInput" rows="3" placeholder="Например: Как я увеличил продажи с помощью нейросетей за 1 день..." class="w-full bg-black text-white border border-gray-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none transition-all"></textarea>
                    </div>
                    <button id="generateHooksBtn" class="w-full bg-white text-black font-semibold py-4 rounded-xl hover:bg-gray-200 transition-colors flex justify-center items-center gap-2">
                        <i class="fa-solid fa-bolt"></i> Сгенерировать 10 хуков
                    </button>
                </div>
            </div>

            <!-- PANEL 2: COMMENTS -->
            <div id="panelComments" class="hidden fade-in">
                <h2 class="text-lg font-semibold mb-4">Оригинальный пост для ответа:</h2>
                <div class="flex flex-col gap-4">
                    <div>
                        <textarea id="postInput" rows="3" placeholder="Вставьте текст чужого поста сюда..." class="w-full bg-black text-white border border-gray-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none transition-all"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Выберите тональность ответа:</label>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                            <button class="tone-btn active bg-blue-600/20 text-blue-400 border border-blue-600/50 rounded-lg py-2 text-sm font-medium transition-colors" data-tone="Дружелюбный">😊 Дружелюбный</button>
                            <button class="tone-btn bg-gray-800 text-gray-400 border border-gray-700 rounded-lg py-2 text-sm font-medium transition-colors hover:bg-gray-700" data-tone="Экспертный">🤓 Экспертный</button>
                            <button class="tone-btn bg-gray-800 text-gray-400 border border-gray-700 rounded-lg py-2 text-sm font-medium transition-colors hover:bg-gray-700" data-tone="Ироничный">😏 Ироничный</button>
                            <button class="tone-btn bg-gray-800 text-gray-400 border border-gray-700 rounded-lg py-2 text-sm font-medium transition-colors hover:bg-gray-700" data-tone="Вопрос">🤔 Вопрос</button>
                        </div>
                    </div>
                    <button id="generateCommentsBtn" class="mt-2 w-full bg-white text-black font-semibold py-4 rounded-xl hover:bg-gray-200 transition-colors flex justify-center items-center gap-2">
                        <i class="fa-solid fa-reply"></i> Написать комментарий
                    </button>
                </div>
            </div>

            <!-- LOADING OVERLAY -->
            <div id="loadingOverlay" class="absolute inset-0 bg-[#181818]/90 backdrop-blur-sm hidden flex-col items-center justify-center z-10">
                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-white mb-4"></div>
                <p id="loadingText" class="text-gray-300 text-sm font-medium animate-pulse">ИИ думает...</p>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div id="resultsContainer" class="hidden flex-col gap-4 fade-in">
            <h3 id="resultsTitle" class="text-xl font-bold mt-2 mb-2 flex items-center gap-2">
                <i class="fa-solid fa-fire text-orange-500"></i> Результат:
            </h3>
            <div id="resultsList" class="flex flex-col gap-4">
                <!-- Cards will be appended here -->
            </div>
        </div>

    </main>

    <script>
        // Загрузка ключа из локального хранилища браузера
        let apiKey = localStorage.getItem('gemini_api_key') || ""; 

        let activeMode = 'hooks'; // 'hooks' or 'comments'
        let selectedTone = 'Дружелюбный';

        // DOM Elements
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
        const tabHooks = document.getElementById('tabHooks');
        const tabComments = document.getElementById('tabComments');
        const panelHooks = document.getElementById('panelHooks');
        const panelComments = document.getElementById('panelComments');
        
        const topicInput = document.getElementById('topicInput');
        const postInput = document.getElementById('postInput');
        const generateHooksBtn = document.getElementById('generateHooksBtn');
        const generateCommentsBtn = document.getElementById('generateCommentsBtn');
        const toneBtns = document.querySelectorAll('.tone-btn');
        
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsList = document.getElementById('resultsList');
        const resultsTitle = document.getElementById('resultsTitle');

        // Initialize API Key UI
        if (apiKey) {
            apiKeyInput.value = apiKey;
        }

        saveApiKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                apiKey = key;
                showToast("API ключ успешно сохранен!");
            } else {
                localStorage.removeItem('gemini_api_key');
                apiKey = "";
                showToast("API ключ удален");
            }
        });

        // Tab Switching Logic
        tabHooks.addEventListener('click', () => {
            activeMode = 'hooks';
            tabHooks.className = 'flex-1 py-3 text-sm font-medium tab-active transition-colors';
            tabComments.className = 'flex-1 py-3 text-sm font-medium tab-inactive hover:text-white transition-colors';
            panelHooks.classList.remove('hidden');
            panelComments.classList.add('hidden');
            resultsContainer.classList.add('hidden');
        });

        tabComments.addEventListener('click', () => {
            activeMode = 'comments';
            tabComments.className = 'flex-1 py-3 text-sm font-medium tab-active transition-colors';
            tabHooks.className = 'flex-1 py-3 text-sm font-medium tab-inactive hover:text-white transition-colors';
            panelComments.classList.remove('hidden');
            panelHooks.classList.add('hidden');
            resultsContainer.classList.add('hidden');
        });

        // Tone Selection Logic
        toneBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                toneBtns.forEach(b => {
                    b.className = 'tone-btn bg-gray-800 text-gray-400 border border-gray-700 rounded-lg py-2 text-sm font-medium transition-colors hover:bg-gray-700';
                });
                const target = e.target;
                target.className = 'tone-btn active bg-blue-600/20 text-blue-400 border border-blue-600/50 rounded-lg py-2 text-sm font-medium transition-colors';
                selectedTone = target.dataset.tone;
            });
        });

        // Generate Hooks Action
        generateHooksBtn.addEventListener('click', async () => {
            if (!apiKey) {
                showToast("Пожалуйста, укажите ваш API ключ Gemini в панели сверху!");
                apiKeyInput.focus();
                return;
            }
            const topic = topicInput.value.trim();
            if (!topic) {
                showToast("Пожалуйста, введите тему поста!");
                topicInput.focus();
                return;
            }
            await processGeneration('hooks', topic);
        });

        // Generate Comments Action
        generateCommentsBtn.addEventListener('click', async () => {
            if (!apiKey) {
                showToast("Пожалуйста, укажите ваш API ключ Gemini в панели сверху!");
                apiKeyInput.focus();
                return;
            }
            const post = postInput.value.trim();
            if (!post) {
                showToast("Пожалуйста, вставьте текст поста!");
                postInput.focus();
                return;
            }
            await processGeneration('comments', post);
        });

        async function processGeneration(mode, inputText) {
            loadingText.innerText = mode === 'hooks' ? 'Пишем вирусные хуки...' : 'Анализируем пост и пишем ответ...';
            loadingOverlay.classList.remove('hidden');
            loadingOverlay.style.display = 'flex';
            resultsContainer.classList.add('hidden');
            resultsList.innerHTML = '';

            try {
                const data = await fetchFromGemini(mode, inputText);
                renderResults(data, mode);
            } catch (error) {
                console.error("API Error:", error);
                
                let errorMsg = error.message;

                resultsList.innerHTML = `
                    <div class="threads-card p-6 rounded-2xl border border-red-900/50 bg-red-900/10 text-center text-red-400">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <p class="font-medium">Произошла ошибка при генерации.</p>
                        <p class="text-sm mt-2 text-red-500/80">${errorMsg}</p>
                    </div>
                `;
                resultsContainer.classList.remove('hidden');
            } finally {
                loadingOverlay.classList.add('hidden');
                loadingOverlay.style.display = 'none';
            }
        }

        async function fetchFromGemini(mode, inputText) {
            if (!apiKey) {
                throw new Error("Missing API Key");
            }

            let systemPrompt = "";
            let userPrompt = "";

            if (mode === 'hooks') {
                systemPrompt = `
Вы — высокооплачиваемый Threads-стратег и эксперт по вирусному копирайтингу. 
Сгенерируй 10 вариантов зацепок (хуков) для поста на заданную тему.
Правила:
1. Краткость: 1-2 коротких предложения (максимум 100 символов).
2. Никакой воды: Убирай слова-паразиты, начинай с сочного факта или эмоции.
3. Тон: Естественный, разговорный.

Категории хуков (по 2 на каждую):
1. Контринтуитивный (Слом шаблона)
2. Личная трансформация (До/После)
3. Агрессивный старт (Указание на ошибку)
4. Секрет / Инсайд (Чит-код)
5. Поляризация (Резкое мнение)

Верни результат СТРОГО в формате JSON - массив объектов.
Схема JSON: [{"text": "текст хука", "category": "название категории", "emoji": "эмодзи категории"}]
`;
                userPrompt = `Тема поста: ${inputText}`;
            } else {
                systemPrompt = `
Вы — мастер вовлечения в Threads. Напиши идеальный реплай на чужой пост.
Заданный тон: ${selectedTone}.
Правила для тона:
- Дружелюбный: тёплый, искренний, поддержка автора. 1-2 предложения. Без лишних эмодзи/хештегов.
- Экспертный: вдумчивый, информативный, добавь ценность или факт. 1-3 предложения.
- Ироничный: слегка саркастичный, меткий в стиле трушного Threads. Без оскорблений.
- Вопрос: глубокий, открытый вопрос по теме поста для вызова дискуссии.

Универсальные правила:
- Язык ответа: СТРОГО тот же, на котором написан оригинальный пост.
- Никаких нейросетевых штампов ("В современном мире...", "Безусловно"). Пиши как человек в мессенджере.
- НИКАКИХ хештегов.
Сгенерируй 3 РАЗНЫХ варианта ответа в заданном тоне.

Верни результат СТРОГО в формате JSON - массив объектов.
Схема JSON: [{"text": "текст комментария", "explanation": "почему это сработает"}]
`;
                userPrompt = `Текст поста: "${inputText}"`;
            }

            const modelCandidates = [
                'gemini-2.5-flash',
                'gemini-2.0-flash'
            ];

            const payload = {
                contents: [{
                    parts: [{ text: userPrompt }]
                }],
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                                text: { type: "STRING" },
                                category: { type: "STRING" },
                                emoji: { type: "STRING" },
                                explanation: { type: "STRING" }
                            },
                            required: ["text"]
                        }
                    }
                }
            };

            let lastError = null;

            for (const modelName of modelCandidates) {
                let retries = 3;
                let delay = 1000;

                while (retries > 0) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });

                        const rawText = await response.text();
                        let data = null;

                        try {
                            data = rawText ? JSON.parse(rawText) : null;
                        } catch (_) {
                            data = null;
                        }

                        if (!response.ok) {
                            const apiMessage = data?.error?.message || `Ошибка API (статус ${response.status})`;

                            if (response.status === 400) {
                                throw new Error(`Запрос отклонён Gemini: ${apiMessage}`);
                            }
                            if (response.status === 403) {
                                throw new Error(`Доступ запрещён: проверьте API-ключ, биллинг и ограничения Gemini API. ${apiMessage}`);
                            }
                            if (response.status === 404) {
                                throw new Error(`Модель ${modelName} не найдена или недоступна для вашего ключа. ${apiMessage}`);
                            }
                            if (response.status === 429) {
                                throw new Error(`Превышен лимит запросов. ${apiMessage}`);
                            }
                            throw new Error(apiMessage);
                        }

                        const textResult = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!textResult) {
                            throw new Error(`Пустой ответ от нейросети (${modelName})`);
                        }

                        return JSON.parse(textResult);
                    } catch (error) {
                        lastError = error;
                        retries--;

                        if (retries === 0) {
                            break;
                        }

                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
            }

            throw lastError || new Error('Не удалось получить ответ от Gemini API');
        }

        function renderResults(items, mode) {
            if (!items || items.length === 0) return;

            resultsTitle.innerHTML = mode === 'hooks' 
                ? '<i class="fa-solid fa-fire text-orange-500"></i> Топовые варианты хуков:'
                : '<i class="fa-solid fa-comment-dots text-blue-500"></i> Варианты комментариев:';

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "threads-card p-5 rounded-2xl flex flex-col sm:flex-row justify-between items-start gap-4 transition-transform hover:-translate-y-1";
                
                let metaInfo = "";
                if (mode === 'hooks') {
                    metaInfo = `<span class="text-xs text-gray-500 font-medium bg-gray-900 px-2 py-1 rounded border border-gray-800">${item.emoji || '✨'} ${item.category || 'Хук'}</span>`;
                } else {
                    metaInfo = `<span class="text-xs text-gray-500 italic"><i class="fa-solid fa-lightbulb text-yellow-500/70 mr-1"></i> ${item.explanation || 'Вариант ответа'}</span>`;
                }

                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="bg-gray-800 text-gray-400 text-xs font-bold px-2 py-1 rounded-md">Вариант ${index + 1}</span>
                            ${metaInfo}
                        </div>
                        <p class="text-[15px] sm:text-base font-medium leading-relaxed break-words whitespace-pre-wrap" id="resultText-${index}">${escapeHtml(item.text)}</p>
                    </div>
                    <button onclick="copyToClipboard('resultText-${index}', this)" class="copy-btn shrink-0 w-12 h-12 sm:w-10 sm:h-10 rounded-full bg-white text-black hover:bg-gray-200 flex items-center justify-center transition-colors shadow-md self-end sm:self-center" title="Копировать">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                `;
                resultsList.appendChild(card);
            });

            resultsContainer.classList.remove('hidden');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = "fixed top-5 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-full shadow-2xl font-medium text-sm z-50 fade-in";
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function copyToClipboard(elementId, btnElement) {
            const text = document.getElementById(elementId).innerText;
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                const icon = btnElement.querySelector('i');
                const originalBg = btnElement.className;
                
                icon.className = 'fa-solid fa-check text-green-600 text-lg';
                btnElement.classList.remove('bg-white', 'text-black');
                btnElement.classList.add('bg-green-100');
                
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy text-base';
                    btnElement.className = originalBg;
                }, 2000);
            } catch (err) {
                console.error('Failed to copy', err);
                showToast("Не удалось скопировать текст");
            } finally {
                textArea.remove();
            }
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return "";
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
